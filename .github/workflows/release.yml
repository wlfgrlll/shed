name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build-linux-musl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - name: Install musl tools
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Build
        run: cargo build --profile dist --target x86_64-unknown-linux-musl

      - name: Stage binary
        run: cp target/x86_64-unknown-linux-musl/dist/shed shed-x86_64-linux-musl

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: shed-x86_64-linux-musl

  build-macos-aarch64:
    runs-on: macos-latest
    env:
      MACOSX_DEPLOYMENT_TARGET: '11.0'
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Build
        run: cargo build --profile dist --target aarch64-apple-darwin

      - name: Stage binary
        run: cp target/aarch64-apple-darwin/dist/shed shed-aarch64-macos

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: shed-aarch64-macos
