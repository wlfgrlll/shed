name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-linux-musl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - name: Install musl tools
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Build
        run: cargo build --profile dist --target x86_64-unknown-linux-musl

      - name: Package
        run: |
          ver="${GITHUB_REF_NAME#v}"
          [ -z "$ver" ] && ver="dev"
          pkg="shed-${ver}-x86_64-linux-musl"
          mkdir "$pkg"
          cp target/x86_64-unknown-linux-musl/dist/shed "$pkg/"
          cp LICENSE "$pkg/"
          tar czf "$pkg.tar.gz" "$pkg"
          echo "PKG=$pkg.tar.gz" >> "$GITHUB_ENV"

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: ${{ env.PKG }}

  build-macos-aarch64:
    runs-on: macos-latest
    env:
      MACOSX_DEPLOYMENT_TARGET: '11.0'
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Build
        run: cargo build --profile dist --target aarch64-apple-darwin

      - name: Package
        run: |
          ver="${GITHUB_REF_NAME#v}"
          [ -z "$ver" ] && ver="dev"
          pkg="shed-${ver}-aarch64-macos"
          mkdir "$pkg"
          cp target/aarch64-apple-darwin/dist/shed "$pkg/"
          cp LICENSE "$pkg/"
          tar czf "$pkg.tar.gz" "$pkg"
          echo "PKG=$pkg.tar.gz" >> "$GITHUB_ENV"

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: ${{ env.PKG }}
